name: Deploy API to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: cafe-api-5560
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api'
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment: production
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Build API'
      shell: pwsh
      run: |
        Write-Host "Building API in Release mode..." -ForegroundColor Cyan
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
        dotnet build --configuration Release --output ./output
        Write-Host "Build completed successfully" -ForegroundColor Green
        popd

    - name: 'Login to Azure'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 'Deploy to Azure Functions'
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'

    - name: 'Configure Blob Storage Settings'
      shell: pwsh
      run: |
        Write-Host "Configuring Blob Storage settings..." -ForegroundColor Cyan
        
        # Get the storage account used by the Function App
        $storageAccount = az functionapp config appsettings list `
          --name ${{ env.AZURE_FUNCTIONAPP_NAME }} `
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} `
          --query "[?name=='AzureWebJobsStorage'].value" `
          --output tsv
        
        if ($storageAccount) {
          # Check if Blob__ConnectionString is already set
          $blobConn = az functionapp config appsettings list `
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} `
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} `
            --query "[?name=='Blob__ConnectionString'].value" `
            --output tsv
          
          if (-not $blobConn -or $blobConn -eq 'UseDevelopmentStorage=true') {
            Write-Host "Setting Blob__ConnectionString from AzureWebJobsStorage..." -ForegroundColor Yellow
            az functionapp config appsettings set `
              --name ${{ env.AZURE_FUNCTIONAPP_NAME }} `
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} `
              --settings "Blob__ConnectionString=$storageAccount" `
              --output none
            Write-Host "Blob__ConnectionString configured" -ForegroundColor Green
          } else {
            Write-Host "Blob__ConnectionString already configured" -ForegroundColor Green
          }
          
          # Ensure Blob__CdnBaseUrl exists (empty string = direct blob URLs)
          $cdnUrl = az functionapp config appsettings list `
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} `
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} `
            --query "[?name=='Blob__CdnBaseUrl'].value" `
            --output tsv
          
          if ($null -eq $cdnUrl) {
            az functionapp config appsettings set `
              --name ${{ env.AZURE_FUNCTIONAPP_NAME }} `
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} `
              --settings "Blob__CdnBaseUrl=" `
              --output none
            Write-Host "Blob__CdnBaseUrl initialized (empty = direct blob URLs)" -ForegroundColor Green
          } else {
            Write-Host "Blob__CdnBaseUrl already configured" -ForegroundColor Green
          }
        } else {
          Write-Host "⚠️ Could not retrieve storage account. Set Blob__ConnectionString manually." -ForegroundColor Yellow
        }
    
    - name: 'Verify Deployment'
      shell: pwsh
      continue-on-error: true
      run: |
        Write-Host "`nWaiting for deployment to complete..." -ForegroundColor Cyan
        Start-Sleep -Seconds 20
        
        Write-Host "Verifying deployment..." -ForegroundColor Cyan
        $maxRetries = 3
        $retryCount = 0
        $success = $false
        
        while ($retryCount -lt $maxRetries -and !$success) {
          try {
            $response = Invoke-RestMethod -Uri "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/auth/admin/verify" -Method GET
            Write-Host "✅ API is responding successfully!" -ForegroundColor Green
            Write-Host "Admin user exists: $($response.exists)" -ForegroundColor Cyan
            Write-Host "Deployment URL: https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net" -ForegroundColor Cyan
            $success = $true
          } catch {
            $retryCount++
            if ($retryCount -lt $maxRetries) {
              Write-Host "Retry $retryCount/$maxRetries - waiting..." -ForegroundColor Yellow
              Start-Sleep -Seconds 10
            } else {
              Write-Host "⚠️  Verification timed out (API may still be warming up)" -ForegroundColor Yellow
              Write-Host "Verify manually at: https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/auth/admin/verify" -ForegroundColor Gray
            }
          }
        }
        
        # Always succeed
        exit 0
    
    - name: 'Deployment Summary'
      shell: pwsh
      run: |
        Write-Host "`n========================================" -ForegroundColor Cyan
        Write-Host "  Deployment Complete!" -ForegroundColor Green
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "API Endpoints:" -ForegroundColor White
        Write-Host "  • Admin Verify: https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/auth/admin/verify" -ForegroundColor Gray
        Write-Host "  • Login:        https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/auth/login" -ForegroundColor Gray
        Write-Host "  • Categories:   https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/categories" -ForegroundColor Gray
        Write-Host "  • Menu:         https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/menu" -ForegroundColor Gray
        Write-Host "  • Image Upload: https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/menu/{id}/image" -ForegroundColor Gray
        Write-Host "========================================" -ForegroundColor Cyan
        Write-Host "Infrastructure:" -ForegroundColor White
        Write-Host "  • Blob Storage: menu-images container (auto-created on startup)" -ForegroundColor Gray
        Write-Host "  • CDN:          Set Blob__CdnBaseUrl app setting to enable" -ForegroundColor Gray
        Write-Host "========================================" -ForegroundColor Cyan
