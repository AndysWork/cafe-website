<div class="auth-page">
  <!-- Left Visual Panel -->
  <div class="auth-visual">
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
      <div class="shape shape-5"></div>
      <div class="shape shape-6"></div>
    </div>
    <div class="visual-content">
      <div class="brand-icon">☕</div>
      <h1 class="brand-title">Café Connect</h1>
      <p class="brand-tagline">Your favorite café experience, just a click away</p>
      <div class="visual-features">
        <div class="feature">
          <span class="feature-emoji">🍰</span>
          <span class="feature-text">Fresh Menu Daily</span>
        </div>
        <div class="feature">
          <span class="feature-emoji">⭐</span>
          <span class="feature-text">Earn Loyalty Rewards</span>
        </div>
        <div class="feature">
          <span class="feature-emoji">🚀</span>
          <span class="feature-text">Quick & Easy Ordering</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="auth-form-panel">
    <div class="form-wrapper">
      <div class="form-header">
        <div class="logo-badge">☕</div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue to your account</p>
      </div>

      <form (ngSubmit)="onLogin()" class="auth-form">
        <div class="input-group" [class.has-value]="username">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder=" "
            required
            autocomplete="username"
          />
          <label for="username">Username</label>
        </div>

        <div class="input-group" [class.has-value]="password">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder=" "
            required
            autocomplete="current-password"
          />
          <label for="password">Password</label>
          <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>

        <div *ngIf="errorMessage" class="error-toast">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span>{{ errorMessage }}</span>
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="btn-loading">
            <span class="spinner"></span>
            Signing in...
          </span>
        </button>

        <a routerLink="/forgot-password" class="forgot-link">Forgot your password?</a>

        <div class="divider">
          <span>or</span>
        </div>

        <p class="switch-auth">
          Don't have an account? <a routerLink="/register">Create one</a>
        </p>
      </form>
    </div>
  </div>
</div>
