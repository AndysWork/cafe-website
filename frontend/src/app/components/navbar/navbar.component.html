<!-- Mobile Overlay -->
<div
  class="mobile-overlay"
  [class.active]="isMobileMenuOpen"
  (click)="closeMobileMenu()"
></div>

<nav class="navbar" [class.mobile-open]="isMobileMenuOpen" role="navigation" aria-label="Main navigation">
  <div class="navbar-container">
    <!-- Logo -->
    <a routerLink="/" class="navbar-brand" (click)="closeMobileMenu()">
      <img src="/Logo.jpg" alt="Maa Tara Cafe Logo" class="brand-logo" />
    </a>

    <!-- Mobile Menu Toggle -->
    <button
      class="mobile-menu-toggle"
      [class.active]="isMobileMenuOpen"
      (click)="toggleMobileMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMobileMenuOpen"
    >
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <!-- Desktop Menu -->
    <div class="navbar-menu" [class.active]="isMobileMenuOpen">
      <ul class="navbar-nav">
        <!-- Home (All users) -->
        <li class="nav-item" *ngIf="!isHomeScreen">
          <a
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">🏠</span>
            Home
          </a>
        </li>

        <!-- Dashboard (Any logged-in user) -->
        <li class="nav-item" *ngIf="isLoggedIn">
          <a
            [routerLink]="dashboardRoute"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">📊</span>
            Dashboard
          </a>
        </li>

        <li class="nav-item" *ngIf="isStaffRoleUser">
          <a
            routerLink="/staff/attendance"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">🕐</span>
            Attendance
          </a>
        </li>

        <li class="nav-item" *ngIf="isStaffRoleUser">
          <a
            routerLink="/staff/payslip"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">💸</span>
            Payslip Access
          </a>
        </li>

        <!-- Menu (Customers Only) -->
        <li class="nav-item" *ngIf="isCustomer">
          <a
            routerLink="/menu"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">🍽️</span>
            Menu
          </a>
        </li>

        <!-- Cart (Customers Only) -->
        <li class="nav-item cart-item" *ngIf="isCustomer">
          <a
            routerLink="/cart"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon cart-icon">
              🛒
              <span class="cart-badge" *ngIf="cartItemCount > 0">{{
                cartItemCount
              }}</span>
            </span>
            Cart
          </a>
        </li>
        <!-- Regular User: Orders -->
        <li class="nav-item" *ngIf="isCustomer">
          <a
            routerLink="/orders"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">🛒</span>
            Orders
          </a>
        </li>

        <!-- Regular User: Loyalty Points -->
        <li class="nav-item" *ngIf="isCustomer">
          <a
            routerLink="/loyalty"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">⭐</span>
            Loyalty Points
          </a>
        </li>

        <!-- Profile (Customers + Partners) -->
        <li class="nav-item" *ngIf="isCustomer || isPartnerUser || isKitchenUser">
          <a
            routerLink="/profile"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">👤</span>
            Profile
          </a>
        </li>
      </ul>

      <!-- Login/Logout Button -->
      <div class="auth-section">
        <button *ngIf="!isLoggedIn" class="btn-login" (click)="onLogin()">
          <span class="login-icon">🔐</span>
          Login
        </button>

        <!-- Notification Bell (Logged in users) -->
        <app-notification-center *ngIf="isLoggedIn"></app-notification-center>

        <!-- Admin Profile Dropdown -->
        <div
          *ngIf="isLoggedIn && isAdmin"
          class="profile-dropdown"
          [class.active]="activeDropdown === 'profile'"
          (mouseenter)="openDropdown('profile')"
          (mouseleave)="scheduleCloseDropdown()"
        >
          <button class="profile-badge" (click)="toggleDropdown('profile')" aria-haspopup="true" [attr.aria-expanded]="activeDropdown === 'profile'">
            <span class="profile-icon">👤</span>
            <span class="username">{{ displayName }}</span>
            <span class="arrow" [class.open]="activeDropdown === 'profile'"
              >▼</span
            >
          </button>

          <ul
            class="dropdown-menu profile-menu"
            [class.show]="activeDropdown === 'profile'"
            (mouseenter)="cancelCloseDropdown()"
            (mouseleave)="scheduleCloseDropdown()"
            role="menu"
          >
            <li>
              <a
                routerLink="/profile"
                routerLinkActive="active"
                class="dropdown-item"
                (click)="closeMobileMenu()"
              >
                <span class="dropdown-icon">✏️</span>
                <div class="dropdown-content">
                  <span class="dropdown-title">Edit Profile</span>
                </div>
              </a>
            </li>
            <li>
              <a
                routerLink="/admin/outlets"
                routerLinkActive="active"
                class="dropdown-item"
                (click)="closeMobileMenu()"
              >
                <span class="dropdown-icon">🏪</span>
                <div class="dropdown-content">
                  <span class="dropdown-title">Outlets</span>
                </div>
              </a>
            </li>
            <li class="divider"></li>
            <li>
              <button class="dropdown-item logout-item" (click)="onLogout()">
                <span class="dropdown-icon">🚪</span>
                <div class="dropdown-content">
                  <span class="dropdown-title">Logout</span>
                </div>
              </button>
            </li>
          </ul>
        </div>

        <!-- Non-admin User Display -->
        <div *ngIf="isNonAdminLoggedIn" class="user-section">
          <span class="username">{{ displayName }}</span>
          <button class="btn-logout" (click)="onLogout()">
            <span class="logout-icon">🚪</span>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
