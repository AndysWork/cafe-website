<div class="profile-page">
  <!-- Hero -->
  <div class="hero">
    <div class="hero-pattern"></div>
    <div class="hero-content">
      <div class="avatar-wrapper">
        <div class="avatar" *ngIf="!user?.profilePictureUrl">{{ (user?.firstName || user?.username || '?')[0] | uppercase }}</div>
        <img class="avatar-img" *ngIf="user?.profilePictureUrl" [src]="user?.profilePictureUrl" alt="Profile picture" />
        <label class="avatar-edit" [class.uploading]="isUploadingPicture">
          <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" (change)="onProfilePictureSelected($event)" hidden />
          {{ isUploadingPicture ? '⏳' : '📷' }}
        </label>
      </div>
      <h1>{{ user?.firstName ? (user?.firstName + ' ' + (user?.lastName || '')) : user?.username }}</h1>
      <p>{{ user?.email }}</p>
      <button *ngIf="user?.profilePictureUrl" class="btn-remove-pic" (click)="removeProfilePicture()" [disabled]="isUploadingPicture">
        Remove Photo
      </button>
    </div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none"><path d="M0,64L60,69.3C120,75,240,85,360,80C480,75,600,53,720,48C840,43,960,53,1080,64C1200,75,1320,85,1380,90L1440,96L1440,120L0,120Z" fill="#fafafa"/></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="profile-content">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab" [class.active]="activeTab === 'profile'" (click)="switchTab('profile')">👤 Profile Info</button>
      <button class="tab" [class.active]="activeTab === 'password'" (click)="switchTab('password')">🔒 Change Password</button>
    </div>

    <!-- Profile Tab -->
    <div class="tab-body" *ngIf="activeTab === 'profile'">
      <div class="form-card">
        <!-- Success/Error Messages -->
        <div class="msg msg-success" *ngIf="profileMessage">✅ {{ profileMessage }}</div>
        <div class="msg msg-error" *ngIf="profileError">❌ {{ profileError }}</div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" [value]="user?.username" disabled class="input-disabled" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [value]="user?.email" disabled class="input-disabled" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" [(ngModel)]="firstName" placeholder="Enter first name" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" [(ngModel)]="lastName" placeholder="Enter last name" />
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" [(ngModel)]="phoneNumber" placeholder="Enter phone number" />
        </div>
        <button class="btn-submit" (click)="updateProfile()" [disabled]="isUpdatingProfile">
          {{ isUpdatingProfile ? 'Saving...' : '💾 Save Changes' }}
        </button>
      </div>
    </div>

    <!-- Password Tab -->
    <div class="tab-body" *ngIf="activeTab === 'password'">
      <div class="form-card">
        <!-- Success/Error Messages -->
        <div class="msg msg-success" *ngIf="passwordMessage">✅ {{ passwordMessage }}</div>
        <div class="msg msg-error" *ngIf="passwordError">❌ {{ passwordError }}</div>

        <div class="form-group">
          <label>Current Password</label>
          <input type="password" [(ngModel)]="currentPassword" placeholder="Enter current password" />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="Enter new password" />
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password" />
        </div>
        <button class="btn-submit" (click)="changePassword()" [disabled]="isChangingPassword">
          {{ isChangingPassword ? 'Changing...' : '🔐 Change Password' }}
        </button>
      </div>
    </div>

    <!-- Back Link -->
    <div class="back-link">
      <a routerLink="/menu">← Back to Menu</a>
    </div>
  </div>
</div>
